<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width = device-width", initial-scale="1.0" />
    <link rel="stylesheet" href="minesweeper.css" />
    <title>Сапер</title>
</head>
<body>
    <h1>Minesweeper</h1>

    <!-- Управление -->
	<div class="controls">
        <label for="rowsInput">Rows:</label>
        <input type="number" id="rowsInput" value="10" min="10"/>

        <label for="colsInput">Columns:</label>
        <input type="number" id="colsInput" value="10" min="10"/>

        <label for="minesInput">Rows:</label>
        <input type="number" id="minesInput" value="15" min="1"/>

        <button onclick="startGame()">Начать игру</button>
    </div>

    <div id="status-message"></div>

    <div id="board" class="game-board"></div>

    <script src="minesweeper.js"></script>
</body>
</html>
