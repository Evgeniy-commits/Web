<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="homework.css" />
    <title>Factorial</title>
</head>
<body>
    <h1>Факториал</h1>
    <label for="numInput">Введите целое неотрицательное число:</label>
    <input type="number" id="numInput" min="0" placeholder="Число" />
	<button onclick="calcFact()">Вычислить</button>
    <div id="result"></div>

    <script>
        function calcFact()
        {
            let input = document.getElementById('numInput');
            let res = document.getElementById('result');

            let n = Number(input.value);

            res.className = '';
            res.textContent = '';

            if (!Number.isInteger(n))
            {
                res.className = 'error';
                res.textContent = 'Число должно быть целым';
                return;
            }

           if (n < 0)
           {
               res.className = 'error';
               res.textContent = 'Число должно быть положительным';
               return;
           }

            let fact = 1;
            for (let i = 2; i <= n; i++)
            {
                fact *= i;
            }

            res.textContent = `Факториал числа ${n} равен ${fact}.`
        }
    </script>
</body>
</html>
