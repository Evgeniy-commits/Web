<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="homework.css" />
    <title>Exponentiation</title>
</head>
<body>
    <h1>Степень</h1>
    <label for="base">Основание:</label>
    <input type="number" id="base" placeholder="Число" />
    <label for="exponent">Степень:</label>
    <input type="number" id="exponent" placeholder="еще раз" />
    <button onclick="calc()">Вычислить</button>
    <div id="result"></div>

    <script>
        function calc()
        {
            let base = parseFloat(document.getElementById('base').value);
			let exponent = parseFloat(document.getElementById('exponent').value);

           

            if (isNaN(base) || isNaN(exponent))
            {
				document.getElementById('result').textContent = 'Пожалуйста, введите корректные числа.';
				return;
			}

			let result = Math.pow(base, exponent);
			document.getElementById('result').textContent = `${base} в степени ${exponent} = ${result}`;
		}
    </script>
</body>
</html>
